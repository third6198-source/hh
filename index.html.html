<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DATE WITH U</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    height: 100vh;
    background: linear-gradient(to bottom, #ffd6e0, #ff8fa3);
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* Mobile container */
.container {
    width: 90%;
    max-width: 400px;
}

/* Bear */
.bear {
    font-size: 40px;
    animation: bounce 1.2s infinite;
}

@keyframes bounce {
    50% { transform: translateY(-12px); }
}

/* Heading */
h1 {
    font-family: 'Dancing Script', cursive;
    font-size: 28px;
    margin: 10px 0;
}

/* Subtitle */
.subtitle {
    font-style: italic;
    font-size: 14px;
}

/* Buttons */
.buttons {
    margin-top: 25px;
    display: flex;
    justify-content: center;
    gap: 40px;
    flex-wrap: wrap;
}

button {
    touch-action: manipulation;
}

.yes-btn {
    padding: 12px 25px;
    font-size: 16px;
    border-radius: 50px;
    border: none;
    color: white;
    background: linear-gradient(45deg, #ff4d6d, #ff1e56);
    box-shadow: 0 0 10px rgba(255,0,80,0.6);
}

.no-btn {
    padding: 10px 20px;
    font-size: 15px;
    border-radius: 50px;
    border: 2px solid red;
    background: white;
    color: red;
    position: relative;
}

/* Hearts */
.heart {
    position: fixed;
    bottom: -20px;
    animation: floatUp linear infinite;
}

@keyframes floatUp {
    0% { transform: translateY(0); opacity: 0; }
    30% { opacity: 1; }
    100% { transform: translateY(-110vh); opacity: 0; }
}

/* Celebration */
.celebration {
    display: none;
}

.yay {
    font-size: 40px;
    animation: pulse 1s infinite;
}

@keyframes pulse {
    50% { transform: scale(1.2); }
}

.spin {
    font-size: 30px;
    animation: spin 2s linear infinite;
}

@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* Confetti */
.confetti {
    position: fixed;
    width: 6px;
    height: 6px;
    top: 0;
    animation: fall linear forwards;
}

@keyframes fall {
    to { transform: translateY(100vh); }
}
</style>
</head>

<body>

<div class="container" id="main">
    <div class="bear">🐻</div>
    <h1>Would like to go on a date with me?</h1>
    <p class="subtitle">I've been gathering courage to ask you this...</p>

    <div class="buttons">
        <button class="yes-btn" onclick="sayYes()">Yes ❤️</button>
        <button class="no-btn" id="noBtn">No</button>
    </div>

    <p style="font-size:13px;margin-top:15px;">
        plzzzzzzzzzzzzzzzzzzzzzzzzzzz
    </p>
</div>

<div class="celebration" id="celebration">
    <div class="yay">Yayyyy!!</div>
    <div class="spin">💖</div>
    <p>I knew you'd say yes...</p>
    <p> Since there's no backend, hit me up</p>
</div>

<script>
const noBtn = document.getElementById("noBtn");
const messages = [
    "Nope, not an option!",
    "Try again!",
    "You sure?",
    "Not happening!",
    "Think again!"
];

let i = 0;

/* Mobile + Desktop move */
function moveButton() {
    const yesRect = document.querySelector(".yes-btn").getBoundingClientRect();
    let x, y;

    do {
        x = Math.random() * (window.innerWidth - 80);
        y = Math.random() * (window.innerHeight - 40);
    } while (
        x > yesRect.left - 80 &&
        x < yesRect.right + 80 &&
        y > yesRect.top - 40 &&
        y < yesRect.bottom + 40
    );

    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

    noBtn.innerText = messages[i];
    i = (i + 1) % messages.length;
}

/* Works for touch + hover */
noBtn.addEventListener("click", moveButton);
noBtn.addEventListener("touchstart", moveButton);

/* Hearts */
let hearts = [];
for (let i = 0; i < 15; i++) {
    let h = document.createElement("div");
    h.className = "heart";
    h.innerText = "❤️";
    h.style.left = Math.random() * 100 + "vw";
    h.style.fontSize = (12 + Math.random()*20) + "px";
    h.style.animationDuration = (3 + Math.random()*4) + "s";
    document.body.appendChild(h);
    hearts.push(h);
}

/* YES */
function sayYes() {
    document.getElementById("main").style.display = "none";

    hearts.forEach(h => h.remove());

    document.getElementById("celebration").style.display = "block";

    for (let i = 0; i < 120; i++) {
        let c = document.createElement("div");
        c.className = "confetti";
        c.style.left = Math.random()*100 + "vw";
        c.style.background = `hsl(${Math.random()*360},100%,50%)`;
        c.style.animationDuration = (2 + Math.random()*3) + "s";
        document.body.appendChild(c);
    }
}
</script>

</body>
</html>
